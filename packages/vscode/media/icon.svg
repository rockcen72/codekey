<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded square background -->
  <rect x="0" y="0" width="24" height="24" rx="5.5" fill="#161412"/>
  <!-- Phone outline -->
  <rect x="8" y="4" width="8" height="16" rx="2.8" fill="none" stroke="#f7f3ee" stroke-width="1.3"/>
  <!-- Phone screen notch -->
  <rect x="10.5" y="5.7" width="3" height="0.5" rx="0.25" fill="#f7f3ee"/>
  <!-- Left code bracket -->
  <g transform="translate(5,12) rotate(45)">
    <line x1="-2" y1="2" x2="-2" y2="-2" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2" y1="2" x2="2" y2="2" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Right code bracket -->
  <g transform="translate(19,12) rotate(45)">
    <line x1="2" y1="-2" x2="2" y2="2" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-2" y1="-2" x2="2" y2="-2" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Checkmark on phone screen -->
  <g transform="translate(12,12) rotate(15)">
    <polyline points="-3,0 -0.5,2.5 3.5,-2" fill="none" stroke="#86efac" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Signal arcs -->
  <g transform="translate(19.2,5.5) rotate(45)">
    <path d="M-3,1.5 A3,3 0 0,1 3,1.5" fill="none" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M-1.5,1.5 A1.5,1.5 0 0,1 1.5,1.5" fill="none" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="0" cy="1.5" r="0.6" fill="#f59e0b"/>
  </g>
</svg>
