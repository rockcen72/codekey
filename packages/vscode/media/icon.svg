<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Outer rounded square -->
  <rect x="1" y="1" width="22" height="22" rx="5" fill="rgba(128,128,128,0.15)" stroke="currentColor" stroke-width="1.2"/>
  <!-- Phone outline -->
  <rect x="7.5" y="4.5" width="9" height="15" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <!-- Camera notch -->
  <rect x="11" y="6" width="2" height="0.6" rx="0.3" fill="currentColor"/>
  <!-- Left code bracket -->
  <g transform="translate(4.5,12) rotate(45)">
    <line x1="-2" y1="2" x2="-2" y2="-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-2" y1="2" x2="2" y2="2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- Right code bracket -->
  <g transform="translate(19.5,12) rotate(45)">
    <line x1="2" y1="-2" x2="2" y2="2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-2" y1="-2" x2="2" y2="-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- Checkmark -->
  <g transform="translate(12,12.5) rotate(15)">
    <polyline points="-2.5,0 -0.5,2 3.5,-1.8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Signal arcs -->
  <g transform="translate(19.5,6.5) rotate(45)">
    <path d="M-3,1.5 A3,3 0 0,1 3,1.5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M-1.5,1.5 A1.5,1.5 0 0,1 1.5,1.5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="0" cy="1.5" r="0.6" fill="currentColor"/>
  </g>
</svg>
